name: "Build & Package"
description: "Builds and packages the app through the local Just/PowerShell scripts."
inputs:
  archive-name:
    description: 'archive name including extension'
    required: true
  runtime:
    description: 'dotnet runtime identifier'
    required: false
    default: win-x64
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Just
      uses: extractions/setup-just@v4

    - name: Build & Package
      shell: pwsh
      run: |
        just "publish-${{ inputs.runtime }}" "${{ inputs.archive-name }}"
