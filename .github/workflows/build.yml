name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup Just
      uses: extractions/setup-just@v4

    - name: Restore dependencies
      run: just restore

    - name: Build App
      run: just build

    - name: Test
      run: just test
